[env:4d_systems_esp32s3_gen4_r8n16]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = espidf
board_upload.flash_size = 8MB
board_build.flash_size = 8MB
board_build.partitions = partitions_singleapp_large.csv
monitor_speed = 115200

lib_deps =
    lvgl/lvgl @ ^9.1.0

build_flags =
    -DCONFIG_LVGL_COLOR_DEPTH_16=1
    -DCONFIG_LVGL_USE_FONT_MONTSERRAT_12=1
    -DCONFIG_LVGL_USE_FONT_MONTSERRAT_14=1
    -DCONFIG_LVGL_USE_FONT_MONTSERRAT_16=1
    -DCONFIG_LVGL_USE_FONT_MONTSERRAT_20=1
    -DCONFIG_LVGL_USE_FONT_MONTSERRAT_24=1

extra_scripts = pre:scripts/extra_script.py